<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="nDfNlMk2wvPV-koGT7Ur1MandTe503qb1CQ0kJw6fdA" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5383957100145583" crossorigin="anonymous"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字数カウント君 - 便利ツール集</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: #efefef;
            color: #000000;
            font-family: "MS PGothic", "MS Pゴシック", sans-serif;
            margin: 20px;
        }

        .container {
            width: 800px;
            margin: 0 auto;
            background-color: #ffffff;
            border: 2px solid #000000;
            padding: 15px;
        }

        h1 {
            color: #ffffff;
            background-color: #008080;
            padding: 5px;
            font-size: 20px;
            text-align: center;
            margin: -15px -15px 15px -15px;
            border-bottom: 2px solid #000000;
        }

        table.main {
            width: 100%;
            border-collapse: collapse;
        }

        table.main td {
            border: 1px solid #cccccc;
            padding: 10px;
        }

        .label {
            background-color: #eeeeee;
            font-weight: bold;
            width: 150px;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            height: 200px;
            border: 2px inset #ffffff;
            background-color: #ffffff;
            font-family: inherit;
            padding: 5px;
            box-sizing: border-box;
        }

        .stat-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .stat-box {
            border: 1px solid #999999;
            background-color: #f9f9f9;
            padding: 5px 10px;
            min-width: 120px;
            text-align: center;
        }

        .stat-val {
            font-size: 20px;
            font-weight: bold;
            color: #000080;
        }

        .stat-label {
            font-size: 11px;
            color: #666666;
        }

        .bar-container {
            width: 100%;
            height: 15px;
            background-color: #dddddd;
            border: 1px solid #999999;
            margin-top: 5px;
        }

        .bar-fill {
            height: 100%;
            background-color: #008080;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            border-top: 1px dotted #999999;
            padding-top: 10px;
        }

        a {
            color: #0000ff;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>文字数カウント君 (Text Analyzer)</h1>

        <div id="root"></div>

        <div class="footer">
            [ <a href="https://00portal.kotojisamadake-tool.workers.dev/">便利ツール集ポータルへ戻る</a> ]
        </div>
    </div>

    <script type="text/babel">
        const App = () => {
            const [text, setText] = React.useState('');

            const analyze = (input) => {
                if (!input) return { chars: 0, charsNoSpace: 0, readTime: '0分0秒', kanjiPct: 0, hiraganaPct: 0, katakanaPct: 0 };

                const chars = input.length;
                const charsNoSpace = input.replace(/\s/g, '').length;

                const readMinutes = Math.floor(charsNoSpace / 500);
                const readSeconds = Math.round((charsNoSpace % 500) / 500 * 60);
                const readTime = `${readMinutes}分${readSeconds}秒`;

                let kanji = 0, hiragana = 0, katakana = 0, total = 0;
                for (const ch of input.replace(/\s/g, '')) {
                    if (/[\u4e00-\u9faf\u3400-\u4dbf]/.test(ch)) kanji++;
                    else if (/[\u3040-\u309f]/.test(ch)) hiragana++;
                    else if (/[\u30a0-\u30ff]/.test(ch)) katakana++;
                    total++;
                }

                return {
                    chars, charsNoSpace, readTime,
                    kanjiPct: total ? Math.round(kanji / total * 100) : 0,
                    hiraganaPct: total ? Math.round(hiragana / total * 100) : 0,
                    katakanaPct: total ? Math.round(katakana / total * 100) : 0,
                };
            };

            const stats = analyze(text);

            return (
                <div>
                    <table class="main">
                        <tr>
                            <td class="label">本文入力</td>
                            <td>
                                <textarea
                                    value={text}
                                    onChange={(e) => setText(e.target.value)}
                                    placeholder="ここに文章を貼り付けてください..."
                                ></textarea>
                                <div style={{ textAlign: 'right', marginTop: '5px' }}>
                                    <button onClick={() => setText('')} style={{ fontSize: '11px', cursor: 'pointer' }}>クリア</button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td class="label">分析結果</td>
                            <td>
                                <div class="stat-grid">
                                    <div class="stat-box">
                                        <div class="stat-label">文字数(全角)</div>
                                        <div class="stat-val">{stats.chars}</div>
                                    </div>
                                    <div class="stat-box">
                                        <div class="stat-label">文字数(空白除)</div>
                                        <div class="stat-val">{stats.charsNoSpace}</div>
                                    </div>
                                    <div class="stat-box">
                                        <div class="stat-label">読了目安</div>
                                        <div class="stat-val">{stats.readTime}</div>
                                    </div>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td class="label">文章構成</td>
                            <td>
                                <div style={{ fontSize: '12px' }}>
                                    漢字: {stats.kanjiPct}%
                                    <div class="bar-container"><div class="bar-fill" style={{ width: `${stats.kanjiPct}%` }}></div></div>
                                    ひらがな: {stats.hiraganaPct}%
                                    <div class="bar-container"><div class="bar-fill" style={{ width: `${stats.hiraganaPct}%`, backgroundColor: '#008000' }}></div></div>
                                    カタカナ: {stats.katakanaPct}%
                                    <div class="bar-container"><div class="bar-fill" style={{ width: `${stats.katakanaPct}%`, backgroundColor: '#808000' }}></div></div>
                                </div>
                            </td>
                        </tr>
                    </table>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- admax -->
    <script src="https://adm.shinobi.jp/s/5dfe8bfce49a43ffe78096b109972b5b"></script>
    <!-- admax -->
</body>

</html>
